    <style>
    :root {
        --primary: #ffffff;
        --gold: #ffbd59;
        --dark: #0d0d0d;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --grad: linear-gradient(135deg, #da8300 0%, #a76400 100%);
    }
.badge-retirada { background: #ff5722 !important; } /* Laranja */
.badge-entrega { background: #25d366 !important; }  /* Verde WhatsApp */
.badge-local { background: #4e44ff !important; }    /* Azul */
    /* CORREÇÃO: Impede o scroll lateral e o "fantasma" do menu */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden; /* Trava a tela horizontalmente */
        font-family: 'Outfit', sans-serif;
        background-color: var(--dark);
        background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%);
        color: #fff;
        min-height: 100vh;
    }

    header {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo-text {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 15px;
    }

    .logo-text span {
        color: var(--gold);
    }

    /* NAVEGAÇÃO */
    .nav-container {
        background: var(--glass);
        padding: 5px;
        border-radius: 15px;
        display: flex;
        gap: 5px;
        margin: 0 auto;
        max-width: 500px;
        border: 1px solid var(--glass-border);
    }

    .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: transparent;
        color: #888;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }

    .tab-btn.active {
        background: var(--grad);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3);
    }

    /* CONTROLE DE EXIBIÇÃO DAS ABAS */
    .tab-content {
        display: none;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* CARDS E GRIDS */
    .grid-pedidos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(5px);
    }

    .badge {
        padding: 6px 12px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 700;
    }

    .badge-local { background: #4e44ff; }
    .badge-site { background: #00c853; }

    .item-row {
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 8px;
        border-left: 3px solid var(--gold);
        font-size: 0.9rem;
    }

    /* BOTÕES FLUTUANTES */
    .admin-actions {
        position: fixed;
        bottom: 30px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 2000;
    }

    .btn-fab {
        width: 60px;
        height: 60px;
        border-radius: 20px;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* MESAS */
    .grid-mesas {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Mantém um tamanho confortável */
    gap: 15px;
}

    .mesa-card {
        background: var(--glass);
        border-radius: 25px;
        padding: 20px;
        text-align: center;
        border: 2px solid transparent;
        transition: 0.3s;
    }

    .mesa-card.aberta {
        border-color: var(--gold);
        background: rgba(255, 189, 89, 0.05);
    }

    /* BALANÇO FINANCEIRO */
    .balanco-card {
        background: var(--glass);
        border-radius: 30px;
        padding: 30px;
        max-width: 500px;
        margin: 0 auto;
        border: 1px solid var(--glass-border);
        text-align: center;
    }

    .money-box {
        display: flex;
        justify-content: space-between;
        padding: 18px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 15px;
        margin-bottom: 10px;
        border: 1px solid var(--glass-border);
    }

    /* CORREÇÃO DO MENU LATERAL: 
       visibility:hidden garante que ele não ocupe espaço lateral enquanto fechado */
    #menu-lateral {
        position: fixed;
        top: 0;
        right: -110%; /* Mais para fora para garantir total remoção */
        width: 100%;
        max-width: 480px;
        height: 100%;
        background: #0d0d0d;
        z-index: 5000;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 20px;
        overflow-y: auto;
        visibility: hidden; 
        box-sizing: border-box;
    }

    #menu-lateral.active {
        right: 0;
        visibility: visible;
        box-shadow: -10px 0 40px rgba(0, 0, 0, 0.9);
    }

    .cat-group {
        margin-bottom: 12px;
        border-radius: 15px;
        overflow: hidden;
        background: var(--glass);
    }

    .cat-head {
        width: 100%;
        padding: 18px;
        background: none;
        border: none;
        color: white;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
    }

    .btn-confirm {
        background: var(--grad);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        font-size: 1.1rem;
    }

    .hidden { display: none !important; }

    /* Ajuste para telas muito pequenas */
    @media (max-width: 400px) {
        .nav-container { width: 95%; }
        .tab-btn span { font-size: 0.7rem; }
        .logo-text { font-size: 1.2rem; }

/* Garante que o card da mesa aceite posições absolutas dentro dele */

}

   // --- INICIALIZAÇÃO DO BANCO (Atualizado para 10 mesas) ---
    async function inicializarMesas() {
        const mesasRef = collection(db, "estado_mesas");
        const snap = await getDocs(mesasRef);
        
        if (snap.size < 10) { 
            for (let i = 1; i <= 10; i++) {

                    n: i,

                    itens: [],

//cancelar mesas
window.cancelarMesa = async (n) => {
    const res = await Swal.fire({
        title: `CANCELAR MESA ${n}?`,
        text: "O consumo será apagado e não irá para o caixa.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#c62828',
        confirmButtonText: 'Sim, cancelar',
        cancelButtonText: 'Voltar'
    });

    if (res.isConfirmed) {
        // 1. Resetar o estado da mesa no banco de dados
        const mesaRef = doc(db, "estado_mesas", `mesa_${n}`);
        await updateDoc(mesaRef, { 
            aberta: false, 
            itens: [], 
            total: 0, 
            garcom: null 
        });

        // 2. Opcional: Limpar pedidos de "COZINHA" dessa mesa que ainda estão pendentes
        // Isso evita que a cozinha prepare algo de uma mesa que acabou de ser cancelada
        const q = query(collection(db, "pedidos"), where("nome", "==", `MESA ${n}`), where("tipo", "==", "COZINHA"));
        const snap = await getDocs(q);
        snap.forEach(async (d) => {
            await deleteDoc(doc(db, "pedidos", d.id));
        });

        Swal.fire({
            title: 'Mesa Cancelada',
            icon: 'success',
            toast: true,
            position: 'top-end',
            timer: 2000,
            showConfirmButton: false
        });
    }
};

<script>
// --- Função para gerar hash SHA-256 ---
async function gerarHashSenha(senha) {
    const encoder = new TextEncoder();
    const data = encoder.encode(senha);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- Hash da senha correta 
const senhaHashCorreta = "276b353614283a1f5475b146b84785ff6c937a8fab745697b7f1c2ec425dd703";

// --- Função de validação com olhinho ---
async function validarSenha() {
    const result = await Swal.fire({
        title: 'Digite a senha',
        html: `
            <input type="password" id="senha-input" class="swal2-input" placeholder="Senha do administrador">
            <button type="button" id="toggle-olho" style="margin-top:220px; background:#333; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-size: 0.8rem;">
                👁 Mostrar/Ocultar Senha
            </button>
        `,
        focusConfirm: false,
        preConfirm: () => {
            return document.getElementById('senha-input').value;
        },
        didOpen: () => {
            const input = document.getElementById('senha-input');
            const btnOlho = document.getElementById('toggle-olho');
            btnOlho.addEventListener('click', () => {
                input.type = input.type === 'password' ? 'text' : 'password';
            });
        },
        showCancelButton: true,
        cancelButtonText: 'Cancelar'
    });

    if (!result.isConfirmed || !result.value) return false;

    const hashDigitada = await gerarHashSenha(result.value);
    return hashDigitada === senhaHashCorreta;
}
