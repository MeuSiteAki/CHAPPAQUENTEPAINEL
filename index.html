<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CHAPPA QUENTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
    
    :root {
        --primary: #ffbe31;
        --gold: #ffbd59;
        --dark: #0d0d0d;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --grad: linear-gradient(135deg, #da8300 0%, #a76400 100%);
    }

    /* CORREÇÃO: Impede o scroll lateral e o "fantasma" do menu */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden; /* Trava a tela horizontalmente */
        font-family: 'Outfit', sans-serif;
        background-color: var(--dark);
        background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%);
        color: #fff;
        min-height: 100vh;
    }

    header {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo-text {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 15px;
    }

    .logo-text span {
        color: var(--gold);
    }

    /* NAVEGAÇÃO */
    .nav-container {
        background: var(--glass);
        padding: 5px;
        border-radius: 15px;
        display: flex;
        gap: 5px;
        margin: 0 auto;
        max-width: 500px;
        border: 1px solid var(--glass-border);
    }

    .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: transparent;
        color: #888;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }

    .tab-btn.active {
        background: var(--grad);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3);
    }

    /* CONTROLE DE EXIBIÇÃO DAS ABAS */
    .tab-content {
        display: none;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* CARDS E GRIDS */
    .grid-pedidos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(5px);
    }

    .badge {
        padding: 6px 12px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 700;
    }

    .badge-local { background: #4e44ff; }
    .badge-site { background: #00c853; }

    .item-row {
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 8px;
        border-left: 3px solid var(--gold);
        font-size: 0.9rem;
    }

    /* BOTÕES FLUTUANTES */
    .admin-actions {
        position: fixed;
        bottom: 30px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 2000;
    }

    .btn-fab {
        width: 60px;
        height: 60px;
        border-radius: 20px;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* MESAS */
    .grid-mesas {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 15px;
    }

    .mesa-card {
        background: var(--glass);
        border-radius: 25px;
        padding: 20px;
        text-align: center;
        border: 2px solid transparent;
        transition: 0.3s;
    }

    .mesa-card.aberta {
        border-color: var(--gold);
        background: rgba(255, 189, 89, 0.05);
    }

    /* BALANÇO FINANCEIRO */
    .balanco-card {
        background: var(--glass);
        border-radius: 30px;
        padding: 30px;
        max-width: 500px;
        margin: 0 auto;
        border: 1px solid var(--glass-border);
        text-align: center;
    }

    .money-box {
        display: flex;
        justify-content: space-between;
        padding: 18px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 15px;
        margin-bottom: 10px;
        border: 1px solid var(--glass-border);
    }

    /* CORREÇÃO DO MENU LATERAL: 
       visibility:hidden garante que ele não ocupe espaço lateral enquanto fechado */
    #menu-lateral {
        position: fixed;
        top: 0;
        right: -110%; /* Mais para fora para garantir total remoção */
        width: 100%;
        max-width: 480px;
        height: 100%;
        background: #0d0d0d;
        z-index: 5000;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 20px;
        overflow-y: auto;
        visibility: hidden; 
        box-sizing: border-box;
    }

    #menu-lateral.active {
        right: 0;
        visibility: visible;
        box-shadow: -10px 0 40px rgba(0, 0, 0, 0.9);
    }

    .cat-group {
        margin-bottom: 12px;
        border-radius: 15px;
        overflow: hidden;
        background: var(--glass);
    }

    .cat-head {
        width: 100%;
        padding: 18px;
        background: none;
        border: none;
        color: white;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
    }

    .btn-confirm {
        background: var(--grad);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        font-size: 1.1rem;
    }

    .hidden { display: none !important; }

    /* Ajuste para telas muito pequenas */
    @media (max-width: 400px) {
        .nav-container { width: 95%; }
        .tab-btn span { font-size: 0.7rem; }
        .logo-text { font-size: 1.2rem; }
    }

    </style>
</head>

<body>

    <audio id="audio-bip">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="logo-text">CHAPPA<span>QUENTE</span></div>
        <div class="nav-container">
            <button class="tab-btn active" data-target="tab-pedidos" onclick="switchTab(this)"><i
                    class="fas fa-receipt"></i><span>Pedidos</span></button>
            <button class="tab-btn" data-target="tab-mesas" onclick="switchTab(this)"><i
                    class="fas fa-utensils"></i><span>Mesas</span></button>
            <button class="tab-btn" data-target="tab-balanco" onclick="switchTab(this)"><i
                    class="fas fa-wallet"></i><span>Caixa</span></button>
        </div>
    </header>

    <div class="admin-actions">
        <button id="btn-som" class="btn-fab" style="background:#2e7d32"><i class="fas fa-bell"></i></button>
        <button id="btn-limpar" class="btn-fab" style="background:#c62828"><i class="fas fa-trash-alt"></i></button>
    </div>

    <main>
        <section id="tab-pedidos" class="tab-content active">
            <div id="lista-pedidos" class="grid-pedidos"></div>
        </section>

        <section id="tab-mesas" class="tab-content">
            <div id="container-mesas" class="grid-mesas"></div>
        </section>

        <section id="tab-balanco" class="tab-content">
            <div class="balanco-card" id="balanco-pdf">
                <div class="logo-text" style="margin-bottom:5px;">CHAPPA<span>QUENTE</span></div>
                <div class="data-balanco" id="data-atual">Carregando data...</div>

                <div class="money-box"><span><i class="fas fa-qrcode"></i> PIX</span><span id="b-pix">R$ 0,00</span>
                </div>
                <div class="money-box"><span><i class="fas fa-credit-card"></i> Cartão</span><span id="b-cartao">R$
                        0,00</span></div>
                <div class="money-box"><span><i class="fas fa-money-bill-wave"></i> Dinheiro</span><span
                        id="b-dinheiro">R$ 0,00</span></div>

                <div style="padding:25px 0;">
                    <small style="color:#888; text-transform:uppercase;">Faturamento Total</small>
                    <div style="font-size:2.8rem; font-weight:800; color:var(--gold);" id="b-total">R$ 0,00</div>
                </div>
                <button class="btn-confirm" onclick="gerarPDFBalanco()"><i class="fas fa-print"></i> EXPORTAR
                    PDF</button>
            </div>
        </section>
    </main>

    <div id="menu-lateral">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 id="titulo-mesa" style="margin:0; color:var(--gold);">LANÇAR MESA</h2>
            <button onclick="toggleMenu(false)"
                style="background:var(--glass); border:none; color:white; width:45px; height:45px; border-radius:12px; font-size:1.5rem;">&times;</button>
        </div>
        <div id="sanfona-menu"></div>
        <div
            style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; margin-top:20px; border: 1px solid var(--glass-border);">
            <div id="lista-temp" style="font-size:0.85rem; color:#aaa; margin-bottom:15px; line-height:1.4;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="font-weight:600;">Subtotal:</span>
                <span id="total-temp" style="font-size:1.6rem; font-weight:800; color:var(--gold);">R$ 0,00</span>
            </div>
            <button class="btn-confirm" onclick="enviarCozinha()">ENVIAR PARA COZINHA</button>
        </div>
    </div>

  <script type="module">
   import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getFirestore, collection, addDoc, getDocs, deleteDoc, 
    doc, onSnapshot, orderBy, query, serverTimestamp, setDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// --- CONFIGURAÇÃO FIREBASE ATUALIZADA ---
const firebaseConfig = {
    apiKey: "AIzaSyDUhKpLopIApQaiEoGaxBXjZzmkROvdaJI",
    authDomain: "app-de-demandas.firebaseapp.com",
    projectId: "app-de-demandas",
    storageBucket: "app-de-demandas.firebasestorage.app",
    messagingSenderId: "857555550806",
    appId: "1:857555550806:web:e7cb602c680585f6c171f7",
    measurementId: "G-MZP03Y2R4J"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

    // --- VARIÁVEIS DE ESTADO ---
    // --- CARDÁPIO COMPLETO PARA ATENDIMENTO DE MESAS ---
    const cardapio = {
        "🍔 SIMPLES": [
            { id: 1, n: "Chappa Kids", p: 13.00 },
            { id: 2, n: "Chappa Quente", p: 14.00 },
            { id: 3, n: "X-Burguer", p: 15.00 },
            { id: 4, n: "X-Salada Especial", p: 15.00 },
            { id: 5, n: "X-Calabresa", p: 16.00 },
            { id: 6, n: "X-Bacon", p: 17.00 },
            { id: 7, n: "X-Tudo", p: 18.00 },
            { id: 8, n: "X-Queijo Especial", p: 20.00 },
            { id: 9, n: "Mega Chappa", p: 26.00 },
            { id: 10, n: "Cheddar Burguer", p: 28.00 }
        ],
        "⭐ ARTESANAIS": [
            { id: 11, n: "Hambúrguer Clássico", p: 18.00 },
            { id: 12, n: "Cheddar Bacon", p: 22.00 },
            { id: 13, n: "Chappa Burguer Picante", p: 25.00 },
            { id: 14, n: "Big Burguer Calabresa", p: 27.00 },
            { id: 15, n: "X Bacon Duplo", p: 27.00 },
            { id: 16, n: "Chappa Quente Especial", p: 35.00 }
        ],
        "🍟 PETISCOS": [
            { id: 17, n: "Calabresa Frita Acebolada", p: 35.00 },
            { id: 18, n: "Carne Acebolada na Chappa", p: 50.00 },
            { id: 19, n: "Combo do Chef", p: 65.00 }
        ],
        "🥤 BEBIDAS": [
            { id: 20, n: "Refrigerante 250ml", p: 4.00 },
            { id: 21, n: "Refrigerante 350ml", p: 6.00 },
            { id: 22, n: "Refrigerante 1L", p: 10.00 },
            { id: 23, n: "Refrigerante 2L", p: 15.00 },
            { id: 24, n: "H2O Limoneto 500ml", p: 7.00 },
            { id: 25, n: "Água mineral (sem gás)", p: 3.00 },
            { id: 26, n: "Suco Natural", p: 7.00 },
            { id: 27, n: "Coca-Cola", p: 7.00 }
        ],
        "🍺 CERVEJAS": [
            { id: 28, n: "Latas 269ml", p: 5.00 },
            { id: 29, n: "Long Neck 330ml", p: 10.00 }
        ]
    };
    let mesas = []; // Agora preenchido via Firebase
    let mesaAtiva = null, carrinhoTemp = [], somAtivo = true, carregado = false;

    // --- INICIALIZAÇÃO DO BANCO (Executa 1x) ---
    async function inicializarMesas() {
        const mesasRef = collection(db, "estado_mesas");
        const snap = await getDocs(mesasRef);
        if (snap.empty) {
            for (let i = 1; i <= 5; i++) {
                await setDoc(doc(db, "estado_mesas", `mesa_${i}`), { n: i, aberta: false, itens: [], total: 0 });
            }
        }
    }
    inicializarMesas();

    // --- SISTEMA DE ABAS E UI ---
    window.switchTab = (btn) => {
        const target = btn.getAttribute('data-target');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(target).classList.add('active');
        btn.classList.add('active');
    };

    window.toggleMenu = (s) => document.getElementById('menu-lateral').classList.toggle('active', s);

    function atualizarData() {
        const d = new Date();
        document.getElementById('data-atual').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    // --- RENDERIZAÇÃO ---
    function renderMesas() {
        const container = document.getElementById('container-mesas');
        if (!container) return;
        container.innerHTML = mesas.map(m => `
            <div class="mesa-card ${m.aberta ? 'aberta' : ''}">
                <div style="font-size:2rem; margin-bottom:10px;"><i class="fas fa-couch"></i></div>
                <div style="font-weight:800; font-size:1.1rem;">MESA ${m.n}</div>
                <div style="font-size:0.75rem; color:#777; margin:10px 0; height:40px; overflow:hidden;">
                    ${m.itens.map(i => i.n).join(', ') || 'Disponível'}
                </div>
                <div style="color:var(--gold); font-weight:700; margin-bottom:15px;">R$ ${m.total.toFixed(2)}</div>
                <div style="display:flex; gap:8px;">
                    ${!m.aberta ? 
                        `<button class="btn-confirm" onclick="abrirMesa(${m.n})">ABRIR</button>` :
                        `<button class="btn-confirm" style="background:#333; flex:1;" onclick="prepararAdd(${m.n})"><i class="fas fa-plus"></i></button>
                         <button class="btn-confirm" style="background:#2e7d32; flex:1;" onclick="fecharMesa(${m.n})"><i class="fas fa-check"></i></button>`
                    }
                </div>
            </div>
        `).join('');
    }

    function renderMenu() {
        const container = document.getElementById('sanfona-menu');
        container.innerHTML = Object.keys(cardapio).map(cat => `
            <div class="cat-group">
                <button class="cat-head" onclick="this.nextElementSibling.classList.toggle('hidden')">
                    ${cat} <i class="fas fa-angle-down"></i>
                </button>
                <div class="cat-content hidden" style="padding:15px; background:rgba(0,0,0,0.2);">
                    ${cardapio[cat].map(i => `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <div><b>${i.n}</b><br><span style="color:var(--gold);">R$ ${i.p.toFixed(2)}</span></div>
                            <button class="btn-confirm" style="width:auto; padding:8px 15px;" onclick="addItemTemp('${i.id}','${i.n}',${i.p})">+</button>
                        </div>
                        <input type="text" id="obs-${i.id}" style="width:100%; background:#000; border:1px solid #333; color:white; padding:8px; border-radius:10px; margin-bottom:10px;" placeholder="Obs...">
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // --- LÓGICA DE PEDIDOS (REALTIME) ---
    window.abrirMesa = async (n) => {
        await updateDoc(doc(db, "estado_mesas", `mesa_${n}`), { aberta: true, total: 0, itens: [] });
    };

    window.prepararAdd = (n) => { 
        mesaAtiva = n; 
        carrinhoTemp = []; 
        renderTemp(); 
        document.getElementById('titulo-mesa').innerText = `MESA ${n}`; 
        toggleMenu(true); 
    };

    window.addItemTemp = (id, n, p) => {
        const obs = document.getElementById(`obs-${id}`).value;
        carrinhoTemp.push({ n, p, obs, q: 1 });
        document.getElementById(`obs-${id}`).value = "";
        renderTemp();
    };

    function renderTemp() {
        document.getElementById('lista-temp').innerText = carrinhoTemp.map(i => i.n).join(', ');
        document.getElementById('total-temp').innerText = `R$ ${carrinhoTemp.reduce((acc, i) => acc + i.p, 0).toFixed(2)}`;
    }

    window.enviarCozinha = async () => {
        if (carrinhoTemp.length === 0) return;
        
        // 1. Envia para a lista de produção
        await addDoc(collection(db, "pedidos"), { 
            nome: `MESA ${mesaAtiva}`, 
            tipo: "COZINHA", 
            itens: carrinhoTemp, 
            data: serverTimestamp() 
        });

        // 2. Atualiza a mesa no Firebase para todos os celulares verem
        const mesaRef = doc(db, "estado_mesas", `mesa_${mesaAtiva}`);
        const mesaAtual = mesas.find(m => m.n === mesaAtiva);
        const novosItens = [...mesaAtual.itens, ...carrinhoTemp];
        const novoTotal = novosItens.reduce((acc, i) => acc + i.p, 0);

        await updateDoc(mesaRef, { itens: novosItens, total: novoTotal });

        toggleMenu(false);
        Swal.fire({ title: 'Enviado!', icon: 'success', toast: true, position: 'top-end', timer: 1500 });
    };

    window.fecharMesa = async (n) => {
        const m = mesas.find(mesa => mesa.n === n);
        const { value: forma } = await Swal.fire({
            title: 'Pagamento MESA ' + n,
            input: 'select',
            inputOptions: { 'Dinheiro': 'Dinheiro', 'PIX': 'PIX', 'Cartão': 'Cartão' },
            confirmButtonText: 'Finalizar',
            showCancelButton: true
        });

        if (forma) {
            await addDoc(collection(db, "pedidos"), {
                nome: `Mesa ${n}`, tipo: "FINALIZADO", itens: m.itens, totalFinal: m.total,
                pagamento: forma, data: serverTimestamp(), end: "Consumo Local"
            });
            // Reseta a mesa no Firebase
            await updateDoc(doc(db, "estado_mesas", `mesa_${n}`), { aberta: false, itens: [], total: 0 });
        }
    };
window.mudarStatus = async (id, status, tel = null, msg = null) => {
    const pedidoRef = doc(db, "pedidos", id);
    await updateDoc(pedidoRef, { status: status });
    if (tel && msg) {
        window.open(`https://wa.me/55${tel}?text=${msg}`);
    }
};
    // --- MONITORAÇÃO REALTIME (MESAS + BALANÇO) ---
    onSnapshot(collection(db, "estado_mesas"), (snap) => {
        mesas = snap.docs.map(doc => doc.data()).sort((a, b) => a.n - b.n);
        renderMesas();
    });

 onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
    const lista = document.getElementById('lista-pedidos');
    let pix = 0, card = 0, din = 0;
    lista.innerHTML = "";

    snap.forEach(docSnap => {
        const p = docSnap.data();
        const id = docSnap.id;
        if (p.tipo === "COZINHA") return; 

        const val = parseFloat(p.totalFinal || p.total || 0);
        if (p.pagamento === "PIX") pix += val;
        else if (p.pagamento === "Cartão") card += val;
        else din += val;

        const valorPago = parseFloat(p.trocoPara || 0);
        const trocoADevolver = (valorPago > val) ? (valorPago - val) : 0;
        const telefoneLimpo = p.telefone ? p.telefone.replace(/\D/g, '') : '';
        
        const msgRecebido = window.encodeURIComponent(`Olá ${p.nome}! Seu pedido foi recebido, por favor aguarde...`);
        const msgEntrega = window.encodeURIComponent(`Seu pedido saiu para entrega, CHAPPA QUENTE agradece, volte sempre!`);
        const emTransito = p.status === "saiu";

        lista.innerHTML += `
            <div class="card" style="${emTransito ? 'border: 2px solid #25d366; background: #1a221c;' : ''}">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <div>
                        <strong style="font-size:1.1rem; color:var(--gold);">${p.nome || 'Cliente'}</strong>
                        ${emTransito ? '<br><small style="color:#25d366; font-weight:bold; font-size:0.7rem;">● ENTREGUE</small>' : ''}
                    </div>
                    <span class="badge ${p.end === 'Consumo Local' ? 'badge-local' : 'badge-site'}">
                        ${p.end === 'Consumo Local' ? 'Mesa' : 'Delivery'}
                    </span>
                </div>

                <div style="font-size:0.85rem; color:#ccc; margin-bottom:10px; line-height:1.4;">
                    ${p.telefone ? `<div><i class="fas fa-phone" style="width:15px"></i> ${p.telefone}</div>` : ''}
                    ${p.end && p.end !== 'Consumo Local' ? `<div><i class="fas fa-map-marker-alt" style="width:15px"></i> ${p.end}</div>` : ''}
                </div>

                ${!emTransito && p.tipo === "SITE" ? `
                    <div style="display:flex; gap:8px; margin-bottom:15px;">
                        <button onclick="window.open('https://wa.me/55${telefoneLimpo}?text=${msgRecebido}')" 
                                style="flex:1; background:#333; color:#fff; border:1px solid #444; padding:8px; border-radius:8px; font-size:0.7rem; cursor:pointer; font-weight:600;">
                            CONFIRMAR
                        </button>
                        <button onclick="mudarStatus('${id}', 'saiu', '${telefoneLimpo}', '${msgEntrega}')" 
                                style="flex:1; background:#25d366; color:#fff; border:none; padding:8px; border-radius:8px; font-size:0.7rem; cursor:pointer; font-weight:800;">
                            <i class="fas fa-motorcycle"></i> SAIU P/ ENTREGA
                        </button>
                    </div>
                ` : ''}

                <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                    ${p.itens.map(i => `
                        <div class="item-row">
                            <b>${i.q || i.quantidade || 1}x</b> ${i.n || i.nome || i.produto || 'Item'} 
                            ${i.obs ? `<br><small style="color:var(--gold); font-size:0.75rem;">Obs: ${i.obs}</small>` : ''}
                        </div>
                    `).join('')}
                </div>

                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:800; font-size:1.2rem; color:white;">R$ ${val.toFixed(2)}</span>
                    <span style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:5px;">
                        ${p.pagamento || 'Pendente'}
                    </span>
                </div>

                ${p.pagamento === "Dinheiro" && valorPago > 0 ? `
                    <div style="margin-top:12px; padding:10px; background:rgba(255,189,89,0.15); border:1px dashed var(--gold); border-radius:10px; font-size:0.85rem; color:var(--gold);">
                        <div style="display:flex; justify-content:space-between;">
                            <span>Pagou com:</span> <b>R$ ${valorPago.toFixed(2)}</b>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:4px; font-weight:800; font-size:0.95rem;">
                            <span>Troco:</span> <span>R$ ${trocoADevolver.toFixed(2)}</span>
                        </div>
                    </div>
                ` : ''}
            </div>`;
    });

    document.getElementById('b-pix').innerText = `R$ ${pix.toFixed(2)}`;
    document.getElementById('b-cartao').innerText = `R$ ${card.toFixed(2)}`;
    document.getElementById('b-dinheiro').innerText = `R$ ${din.toFixed(2)}`;
    document.getElementById('b-total').innerText = `R$ ${(pix + card + din).toFixed(2)}`;

    if (carregado && snap.docChanges().some(c => c.type === "added")) {
        if (somAtivo) document.getElementById('audio-bip').play().catch(() => {});
    }
    carregado = true;
});

    // --- BOTÕES ADICIONAIS ---
    document.getElementById('btn-som').onclick = function() {
        somAtivo = !somAtivo;
        this.style.background = somAtivo ? "#2e7d32" : "#555";
        this.innerHTML = somAtivo ? '<i class="fas fa-bell"></i>' : '<i class="fas fa-bell-slash"></i>';
    };

    document.getElementById('btn-limpar').onclick = async () => {
        const res = await Swal.fire({ title: 'Zerar o Dia?', text: "Isso apaga os registros de vendas!", icon: 'warning', showCancelButton: true });
        if (res.isConfirmed) {
            const q = await getDocs(collection(db, "pedidos"));
            q.forEach(d => deleteDoc(doc(db, "pedidos", d.id)));
        }
    };

    window.gerarPDFBalanco = () => {
        const el = document.getElementById('balanco-pdf');
        html2pdf().from(el).set({ margin: 10, filename: 'fechamento.pdf', html2canvas: { scale: 2 } }).save();
    };

    atualizarData(); renderMenu();
</script>

</body>

</html>
